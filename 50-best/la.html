<!DOCTYPE html>
<html>

<head>
  <title>LA — North America's 50 Best Bars 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="LA — North America's 50 Best Bars 2026">
  <meta name="description" content="Explorer for all 4 Los Angeles bars on the North America's 50 Best Bars 2026 list.">
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css">
  <style>
    body.explorer-page {
      overflow: hidden;
    }

    main.explorer {
      padding: 0;
    }

    main.explorer .section {
      padding: 0;
      max-width: none;
      margin: 0;
    }

    main.explorer .section > div {
      max-width: none;
      margin: 0;
      padding: 0;
    }

    .explorer-wrap {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 45vh 1fr;
      height: calc(100vh - var(--header-height));
      min-height: 500px;
      isolation: isolate;
    }

    @media (width >= 900px) {
      .explorer-wrap {
        grid-template-columns: minmax(360px, 420px) 1fr;
        grid-template-rows: 1fr;
      }
    }

    #explorer-map {
      position: relative;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    .explorer-list {
      overflow-y: auto;
      border-right: 1px solid var(--dark-color);
      background: var(--background-color);
    }

    .explorer-list-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--dark-color);
      background: var(--background-color);
      z-index: 2;
    }

    @media (width >= 900px) {
      .explorer-list-header {
        position: sticky;
        top: 0;
      }
    }

    .explorer-list-header h1 {
      font-size: var(--heading-font-size-m);
      margin: 0 0 4px;
    }

    .explorer-list-header p {
      margin: 0;
      font-size: var(--body-font-size-xs);
      color: #666;
    }

    .explorer-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--light-color);
      cursor: pointer;
      transition: background 0.15s;
      display: grid;
      grid-template-columns: 1fr 90px;
      gap: 14px;
      align-items: start;
    }

    .explorer-bar-text {
      min-width: 0;
    }

    .explorer-thumb {
      width: 90px;
      height: 90px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--light-color);
      display: block;
    }

    .explorer-bar:hover {
      background: var(--light-color);
    }

    .explorer-bar.active {
      background: #fff5f2;
      border-left: 4px solid var(--link-color);
      padding-left: 16px;
    }

    .explorer-bar-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .explorer-rank {
      font-family: var(--fixed-font-family);
      font-weight: 700;
      color: var(--link-color);
      font-size: var(--body-font-size-s);
      flex-shrink: 0;
    }

    .explorer-rank.top {
      background: var(--link-color);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: var(--body-font-size-xs);
    }

    .explorer-name {
      font-weight: 600;
      font-size: var(--body-font-size-s);
      line-height: 1.3;
    }

    .explorer-address {
      font-size: var(--body-font-size-xs);
      color: #555;
      margin: 0 0 6px;
    }

    .address-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted #aaa;
    }

    .address-link:hover {
      color: var(--link-color);
      border-bottom-color: var(--link-color);
      text-decoration: none;
    }

    .explorer-note {
      font-size: var(--body-font-size-xs);
      color: #444;
      line-height: 1.45;
      margin: 0;
    }

    .mapboxgl-popup {
      max-width: 280px !important;
    }

    .mapboxgl-popup-content {
      font-family: var(--body-font-family);
      font-size: var(--body-font-size-xs);
      line-height: 1.45;
      padding: 0;
      border-radius: 8px;
      overflow: hidden;
    }

    .mapboxgl-popup-content .popup-body {
      padding: 12px 16px 14px;
    }

    .mapboxgl-popup-content strong {
      display: block;
      font-size: var(--body-font-size-s);
      margin-bottom: 4px;
    }

    .mapboxgl-popup-content .popup-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .marker-pin {
      width: 30px;
      height: 30px;
      border-radius: 50% 50% 50% 0;
      background: var(--link-color);
      transform: rotate(-45deg);
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .marker-pin.top {
      background: #d4af37;
      width: 36px;
      height: 36px;
    }

    .marker-pin:hover {
      transform: rotate(-45deg) scale(1.15);
    }

    .marker-pin span {
      transform: rotate(45deg);
      color: white;
      font-weight: 700;
      font-size: 11px;
      font-family: var(--fixed-font-family);
    }

    .marker-pin.active {
      transform: rotate(-45deg) scale(1.35);
      z-index: 10;
      animation: marker-pulse 1.4s ease-out infinite;
    }

    .marker-pin.top.active {
      animation-name: marker-pulse-gold;
    }

    @keyframes marker-pulse {
      0% { box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 0 0 rgba(166,33,3,0.5); }
      100% { box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 0 18px rgba(166,33,3,0); }
    }

    @keyframes marker-pulse-gold {
      0% { box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 0 0 rgba(212,175,55,0.6); }
      100% { box-shadow: 0 2px 6px rgba(0,0,0,0.35), 0 0 0 18px rgba(212,175,55,0); }
    }

    .popup-mini {
      padding: 8px 14px;
      font-family: var(--body-font-family);
      font-size: var(--body-font-size-xs);
      font-weight: 600;
      white-space: nowrap;
    }

    .user-pin {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1e88ff;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), 0 0 0 2px rgba(30,136,255,0.4);
      cursor: grab;
    }

    .user-pin:active {
      cursor: grabbing;
    }

    .pin-hint {
      font-size: 12px;
      color: #888;
      margin: 6px 0 0;
      line-height: 1.35;
    }

    .pin-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 20px;
      background: #eef6ff;
      border-bottom: 1px solid var(--dark-color);
      font-size: var(--body-font-size-xs);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    @media (width >= 900px) {
      .pin-status {
        top: var(--list-header-height, 0);
      }
    }

    .pin-status-text {
      color: #1865c2;
      font-weight: 500;
    }

    .pin-clear {
      background: none;
      color: #1865c2;
      border: 1px solid #1865c2;
      padding: 4px 12px;
      font-size: 13px;
      border-radius: 16px;
      margin: 0;
      cursor: pointer;
    }

    .pin-clear:hover,
    .pin-clear:focus {
      background: #1865c2;
      color: white;
    }

    .explorer-distance {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      color: #1865c2;
      background: #eef6ff;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .bar-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      margin-top: 8px;
    }

    .bar-link {
      font-size: 12px;
      font-weight: 500;
      color: var(--link-color);
      padding: 3px 10px;
      border: 1px solid var(--dark-color);
      border-radius: 12px;
      text-decoration: none;
      white-space: nowrap;
      background: var(--background-color);
    }

    .bar-link:hover {
      background: var(--link-color);
      color: white;
      border-color: var(--link-color);
      text-decoration: none;
    }

    .mapboxgl-popup-content .bar-links {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <header></header>
  <main class="explorer">
    <div class="section">
      <div class="explorer-wrap">
        <aside class="explorer-list" id="explorer-list">
          <div class="explorer-list-header">
            <h1>LA — 50 Best Bars 2026</h1>
            <p>4 Los Angeles bars from North America's 50 Best Bars 2026.</p>
            <p class="pin-hint">Tap and hold the map to drop a pin — bars will sort by distance.</p>
          </div>
          <div class="pin-status" id="pin-status" hidden>
            <span class="pin-status-text">Sorted by distance from pin</span>
            <button type="button" class="pin-clear" id="pin-clear">Clear</button>
          </div>
        </aside>
        <div id="explorer-map"></div>
      </div>
    </div>
  </main>
  <footer></footer>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
  <script type="module">
    import { fetchPlaceholders } from '/scripts/aem.js';

    const IMG_BASE = 'https://www.theworlds50best.com/stories/filestore/jpg/';

    const BARS = [
      { rank: 28, name: 'Mírate', address: '1712 N Vermont Ave, Los Feliz', note: 'Agave-driven Los Feliz oasis — tepache, tejuino, and pulque on tap. Try the El Guero margarita with aguachile and nopales granita. Brunch and dinner daily.', lat: 34.1021958, lng: -118.2916414, img: 'Mirate-hero_NA50BB26-LIP.jpg', website: 'https://www.mirate.la/', instagram: 'https://www.instagram.com/mirate.losangeles/', buildout: null },
      { rank: 44, name: 'Daisy Margarita Bar', address: '14633 Ventura Blvd, Sherman Oaks', note: 'Max Reis\'s margarita cantina — private-batch tequilas, no salt rims, and a Salsa Bar of science-forward riffs. Sister spot to Mírate. Open daily from 5pm.', lat: 34.1517661, lng: -118.4521412, img: 'Daisy_NA50BB26-LIP.jpg', website: 'https://www.daisyla.com/', instagram: 'https://www.instagram.com/daisyla/', buildout: null },
      { rank: 68, name: 'Vandell', address: '1966 Hillhurst Ave, Los Feliz', note: 'Mid-century neighborhood bar from the Donna\'s team. Market-fresh cocktails like a tarragon-vinegar martini. Mostly walk-in. Wed–Sun 5pm–1am.', lat: 34.1073013, lng: -118.2872810, img: 'vandell_NA50BB26-51-100-LIP.jpg', website: 'https://www.thevandell.com/', instagram: 'https://www.instagram.com/thevandell/', buildout: null },
      { rank: 92, name: 'Thunderbolt', address: '1263 W Temple St, Historic Filipinotown', note: 'Southern-inspired bar bites and tech-forward, sustainable cocktails. Try the Koji Killer frozen painkiller. Closed Tuesdays. Patio seating.', lat: 34.0663232, lng: -118.2541204, img: 'Thunderbolt_NA50BB26-51-100-LIP.jpg', website: 'https://www.thunderboltla.com/', instagram: 'https://www.instagram.com/thunderboltla/', buildout: null },
    ];

    function linksHtml(bar) {
      const links = [];
      if (bar.website) links.push(`<a class="bar-link" href="${bar.website}" target="_blank" rel="noopener">Website</a>`);
      if (bar.instagram) links.push(`<a class="bar-link" href="${bar.instagram}" target="_blank" rel="noopener">Instagram</a>`);
      if (bar.buildout) links.push(`<a class="bar-link" href="${bar.buildout}" target="_blank" rel="noopener">Buildout</a>`);
      return links.length ? `<div class="bar-links">${links.join('')}</div>` : '';
    }

    function gmapsUrl(bar) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${bar.name}, ${bar.address}`)}`;
    }

    const isMobile = () => window.matchMedia('(max-width: 899px)').matches;

    function popupContent(bar) {
      if (isMobile()) {
        return `<div class="popup-mini">#${bar.rank} ${escapeHTML(bar.name)}</div>`;
      }
      const popupImg = bar.img ? `<img class="popup-img" src="${imgUrl(bar.img)}" alt="${escapeHTML(bar.name)}" loading="lazy">` : '';
      return `${popupImg}<div class="popup-body"><strong>#${bar.rank} ${escapeHTML(bar.name)}</strong>${escapeHTML(bar.address)}<br><br>${escapeHTML(bar.note)}${linksHtml(bar)}</div>`;
    }

    function imgUrl(filename) {
      return IMG_BASE + encodeURIComponent(filename);
    }

    function escapeHTML(s) {
      return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function haversineMiles(lat1, lng1, lat2, lng2) {
      const R = 3958.8;
      const toRad = (d) => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2
        + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.asin(Math.sqrt(a));
    }

    function formatMiles(d) {
      if (d < 0.1) return `${Math.round(d * 5280)} ft`;
      if (d < 1) return `${d.toFixed(2)} mi`;
      return `${d.toFixed(1)} mi`;
    }

    function readPinFromUrl() {
      const v = new URLSearchParams(window.location.search).get('pin');
      if (!v) return null;
      const [lat, lng] = v.split(',').map(Number);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return { lat, lng };
    }

    function writePinUrl(lat, lng, push) {
      const sp = new URLSearchParams(window.location.search);
      if (lat == null) sp.delete('pin');
      else sp.set('pin', `${lat.toFixed(5)},${lng.toFixed(5)}`);
      const qs = sp.toString();
      const url = `${window.location.pathname}${qs ? `?${qs}` : ''}${window.location.hash}`;
      if (push) window.history.pushState({}, '', url);
      else window.history.replaceState({}, '', url);
    }

    async function initExplorer() {
      const placeholders = await fetchPlaceholders();
      mapboxgl.accessToken = placeholders.mapboxToken;

      const bounds = new mapboxgl.LngLatBounds();
      BARS.forEach((bar) => bounds.extend([bar.lng, bar.lat]));

      const map = new mapboxgl.Map({
        container: 'explorer-map',
        style: 'mapbox://styles/mapbox/light-v11',
        bounds,
        fitBoundsOptions: { padding: 60 },
      });

      map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');

      const list = document.getElementById('explorer-list');
      const markers = {};
      const popups = {};
      const cards = {};
      let activePopup = null;

      function selectBar(rank) {
        Object.values(cards).forEach((c) => c.classList.remove('active'));
        const card = cards[rank];
        if (card) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      BARS.forEach((bar) => {
        const el = document.createElement('div');
        el.className = `marker-pin${bar.top ? ' top' : ''}`;
        el.innerHTML = `<span>${bar.rank}</span>`;

        const popup = new mapboxgl.Popup({ offset: bar.top ? 24 : 20, closeButton: false })
          .setHTML(popupContent(bar));

        const marker = new mapboxgl.Marker({ element: el, anchor: 'bottom' })
          .setLngLat([bar.lng, bar.lat])
          .setPopup(popup)
          .addTo(map);

        popup.on('open', () => {
          popup.setHTML(popupContent(bar));
          el.classList.add('active');
        });
        popup.on('close', () => el.classList.remove('active'));

        el.addEventListener('click', () => selectBar(bar.rank));

        markers[bar.rank] = marker;
        popups[bar.rank] = popup;

        const card = document.createElement('div');
        card.className = 'explorer-bar';
        card.dataset.rank = bar.rank;
        card.innerHTML = `
          <div class="explorer-bar-text">
            <div class="explorer-bar-head">
              <span class="explorer-rank${bar.top ? ' top' : ''}">#${bar.rank}</span>
              <span class="explorer-name">${escapeHTML(bar.name)}</span>
              <span class="explorer-distance" hidden></span>
            </div>
            <p class="explorer-address"><a class="address-link" href="${gmapsUrl(bar)}" target="_blank" rel="noopener">${escapeHTML(bar.address)}</a></p>
            <p class="explorer-note">${escapeHTML(bar.note)}</p>
            ${linksHtml(bar)}
          </div>
          ${bar.img ? `<img class="explorer-thumb" src="${imgUrl(bar.img)}" alt="${escapeHTML(bar.name)}" loading="lazy">` : ''}
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          selectBar(bar.rank);
          if (activePopup && activePopup !== popup) activePopup.remove();
          map.flyTo({ center: [bar.lng, bar.lat], zoom: 16, speed: 1.4 });
          marker.togglePopup();
          activePopup = popup;
        });
        list.appendChild(card);
        cards[bar.rank] = card;
      });

      let userPin = null;
      let userMarker = null;
      const statusEl = document.getElementById('pin-status');

      function sortAndRender() {
        const order = userPin
          ? [...BARS].sort((a, b) => haversineMiles(userPin.lat, userPin.lng, a.lat, a.lng)
              - haversineMiles(userPin.lat, userPin.lng, b.lat, b.lng))
          : BARS;

        BARS.forEach((bar) => {
          const distEl = cards[bar.rank].querySelector('.explorer-distance');
          if (userPin) {
            const d = haversineMiles(userPin.lat, userPin.lng, bar.lat, bar.lng);
            distEl.textContent = formatMiles(d);
            distEl.hidden = false;
          } else {
            distEl.hidden = true;
          }
        });

        order.forEach((bar) => list.appendChild(cards[bar.rank]));
        statusEl.hidden = !userPin;
      }

      function setUserPin(lat, lng, { push = true } = {}) {
        userPin = { lat, lng };
        if (!userMarker) {
          const el = document.createElement('div');
          el.className = 'user-pin';
          userMarker = new mapboxgl.Marker({ element: el, draggable: true })
            .setLngLat([lng, lat])
            .addTo(map);
          userMarker.on('dragend', () => {
            const ll = userMarker.getLngLat();
            userPin = { lat: ll.lat, lng: ll.lng };
            writePinUrl(ll.lat, ll.lng, false);
            sortAndRender();
          });
        } else {
          userMarker.setLngLat([lng, lat]);
        }
        writePinUrl(lat, lng, push);
        sortAndRender();
      }

      function clearUserPin({ push = true } = {}) {
        userPin = null;
        if (userMarker) {
          userMarker.remove();
          userMarker = null;
        }
        writePinUrl(null, null, push);
        sortAndRender();
      }

      document.getElementById('pin-clear').addEventListener('click', () => clearUserPin());

      map.on('contextmenu', (e) => {
        setUserPin(e.lngLat.lat, e.lngLat.lng);
      });

      const canvas = map.getCanvasContainer();
      let touchTimer = null;
      let touchStart = null;
      canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        touchStart = { x: t.clientX, y: t.clientY };
        if (touchTimer) clearTimeout(touchTimer);
        touchTimer = setTimeout(() => {
          if (!touchStart) return;
          const rect = canvas.getBoundingClientRect();
          const ll = map.unproject([touchStart.x - rect.left, touchStart.y - rect.top]);
          setUserPin(ll.lat, ll.lng);
          touchTimer = null;
        }, 600);
      }, { passive: true });
      canvas.addEventListener('touchmove', (e) => {
        if (!touchStart || !touchTimer) return;
        const t = e.touches[0];
        if (Math.hypot(t.clientX - touchStart.x, t.clientY - touchStart.y) > 8) {
          clearTimeout(touchTimer);
          touchTimer = null;
        }
      }, { passive: true });
      const cancelTouch = () => {
        if (touchTimer) clearTimeout(touchTimer);
        touchTimer = null;
        touchStart = null;
      };
      canvas.addEventListener('touchend', cancelTouch, { passive: true });
      canvas.addEventListener('touchcancel', cancelTouch, { passive: true });

      let mouseTimer = null;
      let mouseStart = null;
      canvas.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        mouseStart = { x: e.clientX, y: e.clientY };
        if (mouseTimer) clearTimeout(mouseTimer);
        mouseTimer = setTimeout(() => {
          if (!mouseStart) return;
          const rect = canvas.getBoundingClientRect();
          const ll = map.unproject([mouseStart.x - rect.left, mouseStart.y - rect.top]);
          setUserPin(ll.lat, ll.lng);
          mouseTimer = null;
        }, 600);
      });
      canvas.addEventListener('mousemove', (e) => {
        if (!mouseStart || !mouseTimer) return;
        if (Math.hypot(e.clientX - mouseStart.x, e.clientY - mouseStart.y) > 8) {
          clearTimeout(mouseTimer);
          mouseTimer = null;
        }
      });
      const cancelMouse = () => {
        if (mouseTimer) clearTimeout(mouseTimer);
        mouseTimer = null;
        mouseStart = null;
      };
      canvas.addEventListener('mouseup', cancelMouse);
      canvas.addEventListener('mouseleave', cancelMouse);

      window.addEventListener('popstate', () => {
        const p = readPinFromUrl();
        if (p) setUserPin(p.lat, p.lng, { push: false });
        else clearUserPin({ push: false });
      });

      const initialPin = readPinFromUrl();
      if (initialPin) setUserPin(initialPin.lat, initialPin.lng, { push: false });

      window.addEventListener('resize', () => {
        map.resize();
        Object.entries(popups).forEach(([rank, p]) => {
          if (p.isOpen()) p.setHTML(popupContent(BARS.find((b) => b.rank === Number(rank))));
        });
      });

      const container = document.getElementById('explorer-map');
      const ro = new ResizeObserver(() => map.resize());
      ro.observe(container);
      map.once('load', () => map.resize());
    }

    function deferredInit() {
      requestAnimationFrame(() => requestAnimationFrame(initExplorer));
    }

    function whenVisible() {
      document.body.classList.add('explorer-page');
      if (document.body.classList.contains('appear')) {
        deferredInit();
        return;
      }
      const obs = new MutationObserver(() => {
        if (document.body.classList.contains('appear')) {
          obs.disconnect();
          deferredInit();
        }
      });
      obs.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', whenVisible);
    } else {
      whenVisible();
    }
  </script>
</body>

</html>
